; ==============================================================================
; OPcache & JIT Configuration for Development
; ==============================================================================
; 開発環境用のOPcache設定
; - JITコンパイラを有効化してパフォーマンスを向上
; - ファイル変更を検知して自動再読み込み
; ==============================================================================

[opcache]
; OPcache基本設定
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000

; 開発環境用: ファイル変更を検知
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2

; コメントとドキュメントを保存（デバッグ用）
opcache.save_comments = 1

; JIT設定 (PHP 8.0+)
; 1255 = tracing JIT (最も最適化されたモード)
opcache.jit = 1255
opcache.jit_buffer_size = 100M

; 開発環境ではpreloadは使用しない
; (コード変更の度にコンテナ再起動が必要になるため)
